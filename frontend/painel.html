<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão da Copa 2026</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #07111f;
            --card:      #0d1829;
            --border:    #1a3050;
            --gold:      #f5c518;
            --gold-dim:  rgba(245,197,24,0.1);
            --green:     #22c55e;
            --live:      #10b981;
            --red:       #ef4444;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --sub:       #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        .app-header {
            background: linear-gradient(135deg, #0a1628 0%, #0f2040 100%);
            border-bottom: 1px solid rgba(245,197,24,0.18);
            padding: 0.875rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .app-logo { display: flex; align-items: center; gap: 0.75rem; }
        .app-trophy { font-size: 1.6rem; line-height: 1; }
        .app-title { font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.02em; }
        .app-sub { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 1px; }

        .header-right { display: flex; align-items: center; gap: 0.625rem; flex-wrap: wrap; justify-content: flex-end; }
        .user-name { font-size: 0.85rem; color: var(--sub); white-space: nowrap; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.45rem 0.875rem;
            border-radius: 6px; border: none;
            font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: all 0.15s;
            white-space: nowrap;
        }
        .btn-gold { background: var(--gold); color: #07111f; }
        .btn-gold:hover { background: #ffd740; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--sub); }
        .btn-outline:hover { border-color: var(--sub); color: var(--text); }
        .btn-ghost { background: transparent; border: none; color: var(--muted); }
        .btn-ghost:hover { color: var(--red); }
        .btn:disabled { opacity: 0.45; cursor: default; }

        /* ── Tabs ── */
        .tab-nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 0 1rem;
            position: sticky; top: 0; z-index: 100;
            overflow-x: auto;
        }
        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none; border: none; border-bottom: 2px solid transparent;
            color: var(--muted);
            padding: 0.875rem 1rem;
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            cursor: pointer; transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

        /* ── Layout ── */
        .content { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1rem; }
        .content-fluid { max-width: 100%; margin: 0 auto; padding: 1.25rem 2rem; }
        .hidden { display: none !important; }

        /* ── Share bar ── */
        .share-bar {
            background: var(--gold-dim);
            border: 1px solid rgba(245,197,24,0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .share-bar p { font-size: 0.82rem; color: var(--sub); }

        /* ── Date header ── */
        .date-header {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted);
            padding: 1rem 0 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }

        /* ── Match card ── */
        .match-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.625rem;
            transition: border-color 0.15s;
        }
        .match-card:hover { border-color: rgba(245,197,24,0.18); }

        .match-meta {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.68rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.07em;
            margin-bottom: 0.75rem;
        }
        .match-meta .sep { color: var(--border); }

        .badge-live  { color: var(--live); font-weight: 700; }
        .badge-post  { color: var(--muted); }
        .badge-pre   { color: var(--sub); }

        .match-teams {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem; margin-bottom: 0.875rem;
        }

        .team { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
        .team.home { justify-content: flex-start; }
        .team.away { justify-content: flex-end; }

        .team-flag {
            width: 38px; height: 28px; object-fit: contain;
            border-radius: 3px; flex-shrink: 0;
        }

        .team-name {
            font-size: 0.9rem; font-weight: 600; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .score-area { text-align: center; flex-shrink: 0; min-width: 64px; }
        .score { font-size: 1.3rem; font-weight: 700; color: var(--gold); }
        .score-sep { font-size: 1rem; color: var(--border); }

        /* ── Vote buttons ── */
        .match-votes { display: flex; gap: 0.4rem; }

        .btn-vote {
            flex: 1;
            padding: 0.45rem 0;
            border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            border-radius: 6px;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.07em;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-vote:hover:not(:disabled) { border-color: rgba(245,197,24,0.4); color: var(--gold); background: var(--gold-dim); }
        .btn-vote.selected { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
        .btn-vote.correct  { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
        .btn-vote.wrong    { opacity: 0.28; }
        .btn-vote.correct-hint { border-color: rgba(34,197,94,0.3); color: rgba(34,197,94,0.55); }
        .btn-vote:disabled { cursor: default; }

        /* ── Standings ── */
        .grupos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .grupo-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }

        .grupo-title {
            padding: 0.625rem 1rem;
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--gold);
            background: rgba(245,197,24,0.06);
            border-bottom: 1px solid var(--border);
        }

        .standings-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .standings-table th {
            padding: 0.4rem 0.625rem;
            text-align: right; color: var(--muted);
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .standings-table th:nth-child(2) { text-align: left; }
        .standings-table td { padding: 0.45rem 0.625rem; text-align: right; border-top: 1px solid rgba(26,48,80,0.5); }
        .standings-table td:nth-child(2) { text-align: left; }
        .standings-table .row-qualif td { color: var(--text); }
        .standings-table tr:not(.row-qualif) td { color: var(--sub); }

        .team-cell { display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
        .flag-sm { width: 22px; height: 16px; object-fit: contain; border-radius: 2px; flex-shrink: 0; }

        /* ── Champion picker ── */
        .campeao-slots {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 1rem; margin-bottom: 1rem;
        }

        .campeao-slot {
            background: var(--card); border: 2px dashed var(--border);
            border-radius: 10px; padding: 1.25rem;
            text-align: center; min-height: 100px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.5rem;
        }
        .campeao-slot.filled { border-style: solid; border-color: rgba(245,197,24,0.3); }

        .slot-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
        .slot-team  { font-size: 0.9rem; font-weight: 600; color: var(--gold); }
        .slot-empty { font-size: 0.78rem; color: var(--muted); }

        .campeao-hint { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 0.875rem; }

        .busca-input {
            width: 100%; padding: 0.55rem 0.875rem;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 7px; color: var(--text); font-size: 0.85rem;
            outline: none; transition: border-color 0.15s;
        }
        .busca-input:focus { border-color: rgba(245,197,24,0.35); }
        .busca-input::placeholder { color: var(--muted); }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 0.45rem;
            max-height: 400px; overflow-y: auto;
            margin-bottom: 1rem;
        }
        .teams-grid::-webkit-scrollbar { width: 5px; }
        .teams-grid::-webkit-scrollbar-track { background: var(--bg); }
        .teams-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .team-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.625rem 0.4rem;
            text-align: center; cursor: pointer; transition: all 0.15s;
            display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
        }
        .team-card:hover { border-color: rgba(245,197,24,0.25); }
        .team-card.is-campeao { border-color: var(--gold); background: rgba(245,197,24,0.07); }
        .team-card.is-vice    { border-color: var(--sub);  background: rgba(148,163,184,0.06); }

        .team-card-flag { width: 36px; height: 27px; object-fit: contain; border-radius: 3px; }
        .team-card-name { font-size: 0.67rem; font-weight: 600; color: var(--sub); line-height: 1.25; }
        .team-card.is-campeao .team-card-name { color: var(--gold); }
        .team-card.is-vice    .team-card-name { color: var(--text); }

        .save-campeao-row { text-align: center; padding: 0.5rem 0 1rem; }

        /* ── Account section ── */
        .account-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1.25rem; margin-top: 1.5rem;
        }
        .account-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 1.25rem; right: 1.25rem;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.75rem 1.125rem;
            font-size: 0.82rem; color: var(--text);
            z-index: 9999; max-width: 280px;
            animation: toastIn 0.2s ease;
        }
        .toast.success { border-left: 3px solid var(--green); }
        .toast.error   { border-left: 3px solid var(--red); }
        .toast.info    { border-left: 3px solid var(--gold); }
        @keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #0f1e35; border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem;
            max-width: 360px; width: 90%;
        }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .modal-text  { font-size: 0.82rem; color: var(--sub); margin-bottom: 1.25rem; line-height: 1.55; }
        .modal-actions { display: flex; gap: 0.625rem; justify-content: flex-end; }
        .btn-danger { background: var(--red); color: #fff; padding: 0.45rem 1rem; border-radius: 6px; border: none; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }

        /* ── States ── */
        .loading, .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.875rem; }
        .error-state { text-align: center; padding: 3rem; color: var(--red); font-size: 0.875rem; }

        /* ── Chaveamento (bracket) ── */
        .bracket {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            align-items: flex-start;
        }
        .bracket::-webkit-scrollbar { height: 5px; }
        .bracket::-webkit-scrollbar-track { background: var(--bg); }
        .bracket::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .bracket-round { flex: 0 0 260px; }

        .bracket-round-title {
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted);
            text-align: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .bracket-round-title.highlight { color: var(--gold); border-bottom-color: var(--gold); }

        .bracket-round .match-card { margin-bottom: 0.625rem; }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .team-name { font-size: 0.78rem; }
            .team-flag { width: 30px; height: 22px; }
            .score { font-size: 1.1rem; }
            .campeao-slots { grid-template-columns: 1fr; }
            .header-right .user-name { display: none; }
            .app-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
    <div class="app-logo">
        <span class="app-trophy">🏆</span>
        <div>
            <div class="app-title">Copa do Mundo 2026</div>
            <div class="app-sub">Bolão Oficial</div>
        </div>
    </div>
    <div class="header-right">
        <span class="user-name" id="user-name"></span>
        <button class="btn btn-ghost" id="lang-btn" onclick="toggleIdioma()" title="Idioma dos times" style="font-size:0.7rem;font-weight:700;letter-spacing:0.05em;border:1px solid var(--border);border-radius:4px;padding:0.2rem 0.5rem;color:var(--gold)">PT</button>
        <button class="btn btn-ghost" onclick="abrirModal('modal-menu')" title="Menu">&#9776;</button>
    </div>
</header>

<!-- ── Tabs ── -->
<nav class="tab-nav">
    <button class="tab-btn active" data-tab="jogos"        onclick="showTab('jogos')">⚽ Jogos</button>
    <button class="tab-btn"        data-tab="grupos"       onclick="showTab('grupos')">Grupos</button>
    <button class="tab-btn"        data-tab="chaveamento"  onclick="showTab('chaveamento')">🏆 Chaveamento</button>
    <button class="tab-btn"        data-tab="campeao"      onclick="showTab('campeao')">Campeão</button>
</nav>

<main>
    <!-- Jogos -->
    <section id="tab-jogos" class="tab-section content">
        <div class="share-bar hidden" id="share-bar">
            <p>Compartilhe seu bolão com os amigos</p>
            <button class="btn btn-gold" onclick="copiarLink()">Copiar link</button>
        </div>
        <div id="jogos-container"><div class="loading">Carregando jogos...</div></div>
    </section>

    <!-- Grupos -->
    <section id="tab-grupos" class="tab-section content hidden">
        <div class="grupos-grid" id="grupos-container">
            <div class="loading">Carregando classificação...</div>
        </div>
    </section>

    <!-- Chaveamento -->
    <section id="tab-chaveamento" class="tab-section content-fluid hidden">
        <div id="chaveamento-container"><div class="loading">Carregando chaveamento...</div></div>
    </section>

    <!-- Campeão -->
    <section id="tab-campeao" class="tab-section content hidden">
        <div id="campeao-container"></div>
    </section>
</main>

<!-- ── Modal menu ── -->
<div class="modal-overlay hidden" id="modal-menu">
    <div class="modal-box">
        <div class="modal-title">Menu</div>
        <div style="display:flex; flex-direction:column; gap:0.625rem; margin-bottom:1.25rem">
            <button class="btn btn-outline" onclick="fecharModal('modal-menu'); copiarLink()">Compartilhar meu bolão</button>
            <button class="btn btn-outline" onclick="fecharModal('modal-menu'); logout()">Sair</button>
            <button class="btn btn-ghost" style="color:var(--red)" onclick="fecharModal('modal-menu'); abrirModal('modal-delete')">Excluir minha conta</button>
        </div>
        <button class="btn btn-outline" onclick="fecharModal('modal-menu')" style="width:100%">Fechar</button>
    </div>
</div>

<!-- ── Modal confirmação delete ── -->
<div class="modal-overlay hidden" id="modal-delete">
    <div class="modal-box">
        <div class="modal-title">Excluir conta</div>
        <div class="modal-text">Sua conta e todos os seus palpites serão apagados permanentemente. Esta ação não pode ser desfeita.</div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="fecharModal('modal-delete')">Cancelar</button>
            <button class="btn-danger" onclick="deletarConta()">Excluir</button>
        </div>
    </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────
const ESPN = {
    scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',
    standings:  'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings',
};

// ── Traduções ─────────────────────────────────────────────────────────────
const TRADUCOES = {
    'Albania': 'Albânia', 'Algeria': 'Argélia', 'Angola': 'Angola',
    'Argentina': 'Argentina', 'Australia': 'Austrália', 'Austria': 'Áustria',
    'Bahrain': 'Bahrein', 'Belgium': 'Bélgica', 'Bolivia': 'Bolívia',
    'Brazil': 'Brasil', 'Burkina Faso': 'Burkina Faso',
    'Cameroon': 'Camarões', 'Canada': 'Canadá', 'Cape Verde': 'Cabo Verde',
    'Chile': 'Chile', 'China PR': 'China', 'China': 'China',
    'Colombia': 'Colômbia', 'Congo DR': 'Rep. Dem. do Congo',
    'Congo, DR': 'Rep. Dem. do Congo', 'DR Congo': 'Rep. Dem. do Congo',
    "Côte d'Ivoire": 'Costa do Marfim', "Cote d'Ivoire": 'Costa do Marfim',
    'Ivory Coast': 'Costa do Marfim', 'Costa Rica': 'Costa Rica',
    'Croatia': 'Croácia', 'Czech Republic': 'República Tcheca',
    'Czechia': 'República Tcheca', 'Denmark': 'Dinamarca',
    'Ecuador': 'Equador', 'Egypt': 'Egito', 'England': 'Inglaterra',
    'France': 'França', 'Gabon': 'Gabão', 'Georgia': 'Geórgia',
    'Germany': 'Alemanha', 'Ghana': 'Gana', 'Greece': 'Grécia',
    'Guinea': 'Guiné', 'Honduras': 'Honduras', 'Hungary': 'Hungria',
    'Indonesia': 'Indonésia', 'IR Iran': 'Irã', 'Iran': 'Irã',
    'Iraq': 'Iraque', 'Jamaica': 'Jamaica', 'Japan': 'Japão',
    'Jordan': 'Jordânia', 'Korea Republic': 'Coreia do Sul',
    'South Korea': 'Coreia do Sul', 'North Korea': 'Coreia do Norte',
    'Mali': 'Mali', 'Mexico': 'México', 'Morocco': 'Marrocos',
    'Mozambique': 'Moçambique', 'Netherlands': 'Países Baixos',
    'New Zealand': 'Nova Zelândia', 'Nigeria': 'Nigéria',
    'Norway': 'Noruega', 'Oman': 'Omã', 'Panama': 'Panamá',
    'Paraguay': 'Paraguai', 'Peru': 'Peru', 'Poland': 'Polônia',
    'Portugal': 'Portugal', 'Qatar': 'Catar', 'Romania': 'Romênia',
    'Saudi Arabia': 'Arábia Saudita', 'Scotland': 'Escócia',
    'Senegal': 'Senegal', 'Serbia': 'Sérvia', 'Slovakia': 'Eslováquia',
    'Slovenia': 'Eslovênia', 'South Africa': 'África do Sul',
    'Spain': 'Espanha', 'Switzerland': 'Suíça',
    'Tanzania': 'Tanzânia', 'Trinidad and Tobago': 'Trinidad e Tobago',
    'Tunisia': 'Tunísia', 'Turkey': 'Turquia', 'Türkiye': 'Turquia',
    'Ukraine': 'Ucrânia', 'United States': 'Estados Unidos',
    'USA': 'Estados Unidos', 'Uruguay': 'Uruguai',
    'Uzbekistan': 'Uzbequistão', 'Venezuela': 'Venezuela',
    'Wales': 'País de Gales', 'Zambia': 'Zâmbia',
};

let idioma = localStorage.getItem('lang-copa') || 'pt';

function traduzir(nome) {
    if (!nome) return '';
    if (idioma === 'en') return nome;
    if (TRADUCOES[nome]) return TRADUCOES[nome];
    
    let t = nome;
    t = t.replace(/Group ([A-Z]) (1st|2nd|3rd) Place/gi, (m, g, p) => (p==='1st'?'1º':p==='2nd'?'2º':'3º') + ' Lugar Grp ' + g);
    t = t.replace(/Third Place Group (.*)/gi, "3º Lugar Grp $1");
    t = t.replace(/Round of 32 (\d+) Winner/gi, "Venc. 16-avos $1");
    t = t.replace(/Round of 16 (\d+) Winner/gi, "Venc. Oitavas $1");
    t = t.replace(/Quarterfinal (\d+) Winner/gi, "Venc. Quartas $1");
    t = t.replace(/Semifinal (\d+) Winner/gi, "Venc. Semi $1");
    return t;
}

function toggleIdioma() {
    idioma = idioma === 'pt' ? 'en' : 'pt';
    localStorage.setItem('lang-copa', idioma);
    document.getElementById('lang-btn').textContent = idioma.toUpperCase();
    refreshNomes();
    if (campeaoOK) renderCampeao();
}

function refreshNomes() {
    document.querySelectorAll('[data-name-en]').forEach(el => {
        el.textContent = traduzir(el.dataset.nameEn);
    });
}

// ── State ─────────────────────────────────────────────────────────────────
const st = {
    nome: '', token: null,
    palpites: {},    // { jogoId: 'CASA'|'EMPATE'|'VISITANTE' }
    jogo_fases: {},  // { jogoId: fase }
    campeao: null,   // { time_campeao_id, time_vice_id }
    times: [],       // ESPN team objects
};

let selCampeao = null, selVice = null;
let gruposOK = false, campeaoOK = false, chaveamentoOK = false;

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
    try {
        const res  = await fetch('../backend/buscar_palpites.php', { credentials: 'include' });
        const data = await res.json();

        if (!data.sucesso) { window.location.href = 'login.html'; return; }

        st.nome  = data.nome || 'Jogador';
        st.token = data.token_compartilhamento;
        st.campeao = data.palpite_campeao || null;

        (data.palpites || []).forEach(p => {
            st.palpites[p.jogo_id]   = p.resultado_escolhido;
            st.jogo_fases[p.jogo_id] = p.fase;
        });

        document.getElementById('user-name').textContent = `Olá, ${st.nome.split(' ')[0]}!`;
        document.getElementById('lang-btn').textContent = idioma.toUpperCase();

        if (st.token) document.getElementById('share-bar').classList.remove('hidden');

        await Promise.all([carregarJogos(), carregarTimes()]);
    } catch (e) {
        console.error(e);
        window.location.href = 'login.html';
    }
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.tab-section').forEach(s =>
        s.classList.toggle('hidden', s.id !== `tab-${id}`));

    if (id === 'grupos'       && !gruposOK)       carregarGrupos();
    if (id === 'chaveamento'  && !chaveamentoOK)  carregarChaveamento();
    if (id === 'campeao'      && !campeaoOK)      renderCampeao();
}

// ── Jogos ─────────────────────────────────────────────────────────────────
async function carregarJogos() {
    const el = document.getElementById('jogos-container');
    try {
        const res  = await fetch(ESPN.scoreboard);
        const data = await res.json();
        const events = data.events || [];

        if (!events.length) {
            el.innerHTML = '<div class="empty-state">Nenhum jogo disponível no momento.</div>';
            return;
        }

        // Group by day
        const byDate = {};
        events.forEach(ev => {
            const day = ev.date.split('T')[0];
            (byDate[day] = byDate[day] || []).push(ev);
        });

        el.innerHTML = '';
        Object.entries(byDate).forEach(([date, evs]) => {
            const h = document.createElement('div');
            h.className = 'date-header';
            h.textContent = formatDate(date);
            el.appendChild(h);
            evs.forEach(ev => el.appendChild(buildMatchCard(ev)));
        });
    } catch {
        el.innerHTML = '<div class="error-state">Erro ao carregar jogos. Verifique sua conexão.</div>';
    }
}

function buildMatchCard(ev) {
    const comp = ev.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
    const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
    const gs   = ev.status.type.state; // pre | in | post
    const id   = ev.id;
    const pick = st.palpites[id];
    const fase = getFase(ev);

    let winner = null;
    if (gs === 'post') {
        const hs = parseInt(home.score ?? 0);
        const as = parseInt(away.score ?? 0);
        winner = hs > as ? 'CASA' : as > hs ? 'VISITANTE' : 'EMPATE';
    }

    let badge = '';
    if (gs === 'in') {
        const clock = ev.status.displayClock ? ` · ${ev.status.displayClock}` : '';
        badge = `<span class="badge-live">● AO VIVO${clock}</span>`;
    } else if (gs === 'post') {
        badge = `<span class="badge-post">Encerrado</span>`;
    } else {
        badge = `<span class="badge-pre">${formatDateTime(ev.date)}</span>`;
    }

    const scoreHtml = gs === 'pre'
        ? `<span class="score-sep">×</span>`
        : `<span class="score">${home.score ?? 0} — ${away.score ?? 0}</span>`;

    const votes = ['CASA','EMPATE','VISITANTE'].map(op => {
        let cls = 'btn-vote';
        if (pick === op) {
            cls += gs === 'post' ? (winner === op ? ' correct' : ' wrong') : ' selected';
        } else if (gs === 'post' && winner === op) {
            cls += ' correct-hint';
        }
        return `<button class="${cls}" ${gs === 'post' ? 'disabled' : ''}
            onclick="votar('${id}','${op}','${esc(fase)}')">${op}</button>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'match-card';
    card.dataset.jogoId = id;
    card.innerHTML = `
        <div class="match-meta">
            ${esc(fase)} <span class="sep">·</span> ${badge}
        </div>
        <div class="match-teams">
            <div class="team home">
                <img src="${home.team.logo || ''}" alt="${esc(home.team.name)}" class="team-flag" onerror="this.style.display='none'">
                <span class="team-name" data-name-en="${esc(home.team.name)}">${traduzir(home.team.name)}</span>
            </div>
            <div class="score-area">${scoreHtml}</div>
            <div class="team away">
                <span class="team-name" data-name-en="${esc(away.team.name)}">${traduzir(away.team.name)}</span>
                <img src="${away.team.logo || ''}" alt="${esc(away.team.name)}" class="team-flag" onerror="this.style.display='none'">
            </div>
        </div>
        <div class="match-votes">${votes}</div>`;
    return card;
}

async function votar(jogoId, resultado, fase) {
    const prev = st.palpites[jogoId];
    st.palpites[jogoId]   = resultado;
    st.jogo_fases[jogoId] = fase;
    atualizarBotoes(jogoId, resultado, null);

    try {
        const res  = await fetch('../backend/salvar_palpite.php', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify([{ jogo_id: jogoId, resultado_escolhido: resultado, fase }]),
        });
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        showToast('Palpite salvo!', 'success');
    } catch {
        st.palpites[jogoId] = prev;
        atualizarBotoes(jogoId, prev, null);
        showToast('Erro ao salvar palpite.', 'error');
    }
}

function atualizarBotoes(jogoId, selected, winner) {
    const card = document.querySelector(`[data-jogo-id="${jogoId}"]`);
    if (!card) return;
    card.querySelectorAll('.btn-vote').forEach(btn => {
        const op = btn.textContent.trim();
        btn.classList.remove('selected','correct','wrong','correct-hint');
        if (selected === op) {
            if (winner) btn.classList.add(winner === op ? 'correct' : 'wrong');
            else        btn.classList.add('selected');
        } else if (winner && winner === op) {
            btn.classList.add('correct-hint');
        }
    });
}

// ── Grupos ────────────────────────────────────────────────────────────────
async function carregarGrupos() {
    const el = document.getElementById('grupos-container');
    try {
        const res  = await fetch(ESPN.standings);
        const data = await res.json();
        const grupos = data.children || [];

        if (!grupos.length) {
            el.innerHTML = '<div class="empty-state">Classificação não disponível ainda.</div>';
            return;
        }

        el.innerHTML = '';
        grupos.forEach(g => el.appendChild(buildGrupoCard(g)));
        gruposOK = true;
    } catch {
        el.innerHTML = '<div class="error-state">Erro ao carregar classificação.</div>';
    }
}

function buildGrupoCard(grupo) {
    let entries = grupo.standings?.entries || [];
    
    // Mapeia e calcula os atributos de ordenação
    entries.forEach(entry => {
        const st = {};
        (entry.stats || []).forEach(s => { st[s.type] = s.value; });
        entry._stats = st; // Salva para não precisar fazer o loop de novo
    });

    // Ordenação: 1º Pontos (decrescente), 2º Saldo de Gols (decrescente)
    entries.sort((a, b) => {
        const ptsA = a._stats.points || 0;
        const ptsB = b._stats.points || 0;
        if (ptsA !== ptsB) return ptsB - ptsA;
        
        const sgA = a._stats.pointDifferential || 0;
        const sgB = b._stats.pointDifferential || 0;
        return sgB - sgA;
    });

    const rows = entries.map((entry, i) => {
        const stats = entry._stats;
        const logo = entry.team?.logos?.[0]?.href || '';
        return `<tr class="${i < 2 ? 'row-qualif' : ''}">
            <td>${i + 1}</td>
            <td class="team-cell">
                <img src="${logo}" alt="" class="flag-sm" onerror="this.style.display='none'">
                <span data-name-en="${entry.team?.name || ''}">${traduzir(entry.team?.name || '—')}</span>
            </td>
            <td>${stats.points        ?? '—'}</td>
            <td>${stats.gamesPlayed   ?? '—'}</td>
            <td>${stats.wins          ?? '—'}</td>
            <td>${stats.ties          ?? '—'}</td>
            <td>${stats.losses        ?? '—'}</td>
            <td>${stats.pointDifferential ?? '—'}</td>
        </tr>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'grupo-card';
    div.innerHTML = `
        <div class="grupo-title">${grupo.name}</div>
        <table class="standings-table">
            <thead><tr>
                <th>#</th><th>Time</th><th>Pts</th>
                <th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
    return div;
}

// ── Chaveamento ───────────────────────────────────────────────────────────
const FASES_KNOCKOUT = {
    'round-of-32':    'Fase Eliminatória',
    'round-of-16':    'Oitavas de Final',
    'quarterfinals':  'Quartas de Final',
    'semifinals':     'Semifinais',
    '3rd-place-match':'3º Lugar',
    'final':          'Final',
};
const FASES_ORDER = ['round-of-32','round-of-16','quarterfinals','semifinals','3rd-place-match','final'];

async function carregarChaveamento() {
    const el = document.getElementById('chaveamento-container');
    try {
        const res    = await fetch(`${ESPN.scoreboard}?dates=20260629-20260719`);
        const data   = await res.json();
        const events = data.events || [];

        const knockout = events.filter(ev => {
            const slug = ev.season?.slug;
            return slug && slug !== 'grupos' && FASES_KNOCKOUT[slug];
        });

        if (!knockout.length) {
            el.innerHTML = '<div class="empty-state">Fase eliminatória ainda não iniciou.<br>Disponível a partir de 29/06.</div>';
            chaveamentoOK = true;
            return;
        }

        const byRound = {};
        knockout.forEach(ev => {
            const slug = ev.season?.slug || 'outros';
            (byRound[slug] = byRound[slug] || []).push(ev);
        });

        const bracket = document.createElement('div');
        bracket.className = 'bracket';

        FASES_ORDER.forEach(slug => {
            if (!byRound[slug]) return;
            const col = document.createElement('div');
            col.className = 'bracket-round';
            const isHighlight = slug === 'final';
            col.innerHTML = `<div class="bracket-round-title${isHighlight ? ' highlight' : ''}">${FASES_KNOCKOUT[slug]}</div>`;
            byRound[slug].forEach(ev => col.appendChild(buildMatchCard(ev)));
            bracket.appendChild(col);
        });

        el.innerHTML = '';
        el.appendChild(bracket);
        chaveamentoOK = true;
    } catch {
        el.innerHTML = '<div class="error-state">Erro ao carregar o chaveamento.</div>';
    }
}

// ── Times ─────────────────────────────────────────────────────────────────
async function carregarTimes() {
    try {
        const res    = await fetch(ESPN.standings);
        const data   = await res.json();
        const grupos = data.children || [];
        st.times = [];
        grupos.forEach(g => {
            (g.standings?.entries || []).forEach(entry => {
                const t = entry.team;
                if (t) st.times.push({
                    id:    t.id,
                    name:  t.name,
                    logos: t.logos || [],
                    logo:  t.logos?.[0]?.href || '',
                });
            });
        });
    } catch { st.times = []; }
}

// ── Campeão ───────────────────────────────────────────────────────────────
function renderCampeao() {
    const el = document.getElementById('campeao-container');
    if (!st.times.length) {
        el.innerHTML = '<div class="loading">Carregando times...</div>';
        carregarTimes().then(() => {
            if (st.times.length) renderCampeao();
            else el.innerHTML = '<div class="error-state">Não foi possível carregar os times.</div>';
        });
        return;
    }
    const firstRender = !campeaoOK;
    campeaoOK = true;

    if (firstRender && st.campeao && st.times.length) {
        selCampeao = st.times.find(t => t.id === st.campeao.time_campeao_id) || null;
        selVice    = st.times.find(t => t.id === st.campeao.time_vice_id)    || null;
    }

    const slotHtml = (sel, label) => {
        const logo = sel ? (sel.logos?.[0]?.href || sel.logo || '') : '';
        return `<div class="campeao-slot ${sel ? 'filled' : ''}">
            <div class="slot-label">${label}</div>
            ${sel
                ? `<img src="${logo}" class="team-flag" style="width:44px;height:33px" onerror="this.style.display='none'">
                   <div class="slot-team" data-name-en="${esc(sel.name)}">${traduzir(sel.name)}</div>`
                : `<div class="slot-empty">Não escolhido</div>`}
        </div>`;
    };

    const teamCards = st.times.length
        ? st.times.map(t => {
            const logo = t.logos?.[0]?.href || t.logo || '';
            const isCamp = selCampeao?.id === t.id;
            const isVice = selVice?.id    === t.id;
            let cls = 'team-card';
            if (isCamp) cls += ' is-campeao';
            if (isVice) cls += ' is-vice';
            return `<div class="${cls}" data-name-en="${esc(t.name)}" onclick="selecionarTime('${t.id}')">
                <img src="${logo}" alt="${esc(t.name)}" class="team-card-flag" onerror="this.style.display='none'">
                <div class="team-card-name">${traduzir(t.name)}</div>
            </div>`;
        }).join('')
        : '<div class="loading">Carregando times...</div>';

    const busca = st.times.length
        ? `<input id="busca-time" class="busca-input" placeholder="Buscar time..." oninput="filtrarTimes()" autocomplete="off" style="margin-bottom:0.625rem">`
        : '';

    el.innerHTML = `
        <div class="campeao-slots">
            ${slotHtml(selCampeao, '🥇 Campeão')}
            ${slotHtml(selVice,    '🥈 Vice')}
        </div>
        <p class="campeao-hint">1º clique: Campeão &nbsp;·&nbsp; 2º clique: Vice &nbsp;·&nbsp; Clique novamente para desmarcar</p>
        ${busca}
        <div class="teams-grid">${teamCards}</div>
        <div class="save-campeao-row">
            <button class="btn btn-gold" onclick="salvarCampeao()" ${selCampeao ? '' : 'disabled'}>Salvar palpite</button>
        </div>`;
}

function selecionarTime(id) {
    const time = st.times.find(t => t.id === id);
    if (!time) return;

    if (selCampeao?.id === id)      selCampeao = null;
    else if (selVice?.id === id)    selVice = null;
    else if (!selCampeao)           selCampeao = time;
    else if (!selVice)              selVice = time;
    else { selCampeao = time; selVice = null; }

    const q = document.getElementById('busca-time')?.value || '';
    renderCampeao();
    if (q) {
        const inp = document.getElementById('busca-time');
        if (inp) { inp.value = q; filtrarTimes(); }
    }
}

function filtrarTimes() {
    const q = (document.getElementById('busca-time')?.value || '').toLowerCase();
    document.querySelectorAll('.team-card').forEach(c => {
        const en = (c.dataset.nameEn || '').toLowerCase();
        const pt = (TRADUCOES[c.dataset.nameEn] || '').toLowerCase();
        c.style.display = (en.includes(q) || pt.includes(q)) ? '' : 'none';
    });
}

async function salvarCampeao() {
    if (!selCampeao) return;
    try {
        const res  = await fetch('../backend/salvar_campeao.php', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                time_campeao_id: selCampeao.id,
                time_vice_id:    selVice?.id || '',
            }),
        });
        const data = await res.json();
        if (data.sucesso) {
            st.campeao = { time_campeao_id: selCampeao.id, time_vice_id: selVice?.id || '' };
            showToast('Palpite de campeão salvo!', 'success');
        } else {
            showToast(data.mensagem || 'Erro ao salvar.', 'error');
        }
    } catch { showToast('Erro de conexão.', 'error'); }
}

// ── Compartilhar ──────────────────────────────────────────────────────────
function copiarLink() {
    if (!st.token) { showToast('Token não disponível.', 'error'); return; }
    const link = `${location.origin}/frontend/compartilhado.html?token=${st.token}`;
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(link).then(() => showToast('Link copiado!', 'info'));
    } else {
        const inp = Object.assign(document.createElement('input'), { value: link });
        document.body.appendChild(inp); inp.select(); document.execCommand('copy');
        document.body.removeChild(inp); showToast('Link copiado!', 'info');
    }
}

// ── Modal ─────────────────────────────────────────────────────────────────
function abrirModal(id)  { document.getElementById(id)?.classList.remove('hidden'); }
function fecharModal(id) { document.getElementById(id)?.classList.add('hidden'); }

document.querySelectorAll('.modal-overlay').forEach(overlay =>
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); }));

// ── Auth ──────────────────────────────────────────────────────────────────
async function logout() {
    await fetch('../backend/logout.php', { credentials: 'include' }).catch(() => {});
    window.location.href = 'login.html';
}

async function deletarConta() {
    try {
        const res  = await fetch('../backend/deletar_conta.php', { method: 'POST', credentials: 'include' });
        const data = await res.json();
        if (data.sucesso) window.location.href = 'login.html';
        else showToast(data.mensagem || 'Erro ao excluir.', 'error');
    } catch { showToast('Erro de conexão.', 'error'); }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
    const t = Object.assign(document.createElement('div'), { className: `toast ${type}`, textContent: msg });
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    return new Date(y, m - 1, d).toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
}

function formatDateTime(iso) {
    return new Date(iso).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function getFase(ev) {
    const note = ev.notes?.[0];
    if (note?.headline) return note.headline;
    if (note?.text)     return note.text;
    const stype = ev.season?.type?.name;
    if (stype && stype !== 'Regular Season') return stype;
    return 'Fase de Grupos';
}

function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
