<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Teste Backend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Criar Conta</h3>
                    <div id="mensagem" class="alert d-none" role="alert"></div>
                    <form id="formCadastro">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" name="nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" name="senha" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Cadastrar</button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a href="login.html">Ir para Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('formCadastro').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const msgDiv = document.getElementById('mensagem');
    fetch('../backend/cadastrar.php', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
        msgDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
        if (data.sucesso) {
            msgDiv.classList.add('alert-success');
            msgDiv.innerText = data.mensagem;
            this.reset();
        } else {
            msgDiv.classList.add('alert-danger');
            msgDiv.innerText = data.mensagem;
        }
    })
    .catch(err => {
        msgDiv.classList.remove('d-none', 'alert-success');
        msgDiv.classList.add('alert-danger');
        msgDiv.innerText = "Erro.";
    });
});
</script>
</body>
</html>
