version: '3.8'

services:
  web:
    build: .
    container_name: bolao_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:z
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bolao_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bolao
    volumes:
      - db_data:/var/lib/mysql:z
      # Isso faz o MySQL rodar o nosso init.sql automaticamente na primeira vez que subir
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:z

  # Opcional: Um phpMyAdmin local para você ver o banco visualmente
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bolao_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
